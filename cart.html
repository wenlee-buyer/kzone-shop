<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>購物車｜K.Zone 日韓代購</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
.cart-page { padding: 12px 16px 200px; max-width: 560px; margin: 0 auto; }
.cart-item { background: #fff; border-radius: 12px; border: 0.5px solid var(--c-blush); padding: 12px; display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
.ci-img { width: 60px; height: 60px; background: var(--c-cream); border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.ci-img img { width: 100%; height: 100%; object-fit: cover; }
.ci-info { flex: 1; min-width: 0; }
.ci-name { font-size: 13px; font-weight: 700; color: var(--c-coffee); }
.ci-style { font-size: 11px; color: var(--c-rose-text); margin-top: 3px; }
.ci-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
.ci-price { font-size: 14px; font-weight: 700; color: var(--c-orange); }
.ci-qty-ctrl { display: flex; align-items: center; gap: 8px; }
.ci-qbtn { width: 24px; height: 24px; border-radius: 50%; border: 0.5px solid var(--c-rose); background: #fff; font-size: 14px; color: var(--c-coffee); display: flex; align-items: center; justify-content: center; }
.ci-qnum { font-size: 12px; font-weight: 700; min-width: 16px; text-align: center; }
.ci-remove { background: none; border: none; color: var(--c-rose-text); font-size: 16px; padding: 4px; flex-shrink: 0; }
.cart-total { background: #fff; border-radius: 12px; border: 0.5px solid var(--c-blush); padding: 14px; margin-bottom: 14px; }
.ct-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--c-rose-text); margin-bottom: 7px; }
.ct-total { display: flex; justify-content: space-between; font-size: 17px; font-weight: 700; color: var(--c-coffee); border-top: 0.5px solid var(--c-blush); padding-top: 10px; margin-top: 6px; }
.checkout-note { background: #fff8f5; border: 0.5px solid var(--c-orange); border-radius: 10px; padding: 13px; margin-bottom: 14px; font-size: 12px; color: var(--c-coffee); line-height: 1.8; text-align: center; }
.checkout-note strong { color: var(--c-orange); }

#orderImageCanvas { padding: 24px; background: var(--c-bg); width: 420px; }
.oi-header { text-align: center; padding-bottom: 16px; border-bottom: 2px solid var(--c-coffee); margin-bottom: 16px; }
.oi-title { font-size: 22px; font-weight: 700; color: var(--c-coffee); }
.oi-sub { font-size: 12px; color: var(--c-rose-text); margin-top: 4px; }
.oi-item { display: flex; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--c-blush); align-items: center; }
.oi-img { width: 50px; height: 50px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: var(--c-cream); display:flex; align-items:center; justify-content:center;}
.oi-img img { width: 100%; height: 100%; object-fit: cover; }
.oi-name { font-size: 13px; font-weight: 700; color: var(--c-coffee); }
.oi-meta { font-size: 11px; color: var(--c-rose-text); margin-top: 2px; }
.oi-price { font-size: 13px; font-weight: 700; color: var(--c-orange); margin-left: auto; white-space: nowrap; }
.oi-total { display: flex; justify-content: space-between; padding-top: 14px; margin-top: 6px; border-top: 2px solid var(--c-coffee); font-size: 17px; font-weight: 700; color: var(--c-coffee); }
.oi-customer { background: var(--c-cream); border-radius: 10px; padding: 10px 12px; margin-top: 14px; font-size: 13px; color: var(--c-coffee); }
.oi-footer { text-align: center; font-size: 10px; color: var(--c-rose-text); margin-top: 16px; }
</style>
</head>
<body>

<div class="navbar">
  <div class="container">
    <a href="index.html" class="nav-icon-btn" aria-label="返回首頁" style="font-size:19px">
      <span class="ico" data-icon="arrow-left" data-size="18"></span>
    </a>
    <div class="logo-wrap"><div class="logo-title" style="font-size:16px">我的購物車</div></div>
    <div style="width:32px"></div>
  </div>
</div>

<div class="cart-page" id="cartContent">
  <div class="loading-wrap"><div class="spin"></div>讀取購物車中...</div>
</div>

<div id="orderImageCanvas" style="position:absolute; left:-9999px; top:0"></div>

<script src="firebase-config.js"></script>
<script src="assets/icons.js"></script>
<script src="assets/illustrations.js"></script>
<script src="assets/common.js"></script>
<script>document.addEventListener("DOMContentLoaded", () => renderStaticIcons());</script>
<script>
let settings = {};

async function init() {
  settings = await getSettings();
  render();
}

function render() {
  const cart = getCart();
  const container = document.getElementById('cartContent');

  if (cart.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="padding-top:60px">
        ${SVG_EMPTY_CART}
        <p style="margin-top:14px; font-size:14px">購物車是空的</p>
        <button class="btn-primary" style="max-width:200px; margin:18px auto 0" onclick="location.href='index.html'">去逛逛商品</button>
      </div>
    `;
    return;
  }

  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
  const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);

  let html = cart.map((item, idx) => `
    <div class="cart-item">
      <div class="ci-img">${item.image ? `<img src="${item.image}" alt="${escapeHtml(item.name)}">` : `${icon('photo', 18)}`}</div>
      <div class="ci-info">
        <div class="ci-name">${escapeHtml(item.name)}</div>
        ${item.style ? `<div class="ci-style">款式：${escapeHtml(item.style)}</div>` : ''}
        <div class="ci-row">
          <span class="ci-price">${formatPrice(item.price)}</span>
          <div class="ci-qty-ctrl">
            <button class="ci-qbtn" onclick="changeQty(${idx}, -1)" aria-label="減少">−</button>
            <span class="ci-qnum">${item.qty}</span>
            <button class="ci-qbtn" onclick="changeQty(${idx}, 1)" aria-label="增加">+</button>
          </div>
        </div>
      </div>
      <button class="ci-remove" onclick="removeItem(${idx})" aria-label="移除商品">${icon('trash', 18)}</button>
    </div>
  `).join('');

  html += `
    <div class="cart-total">
      <div class="ct-row"><span>商品小計</span><span>${formatPrice(total)}</span></div>
      <div class="ct-row"><span>共 ${totalQty} 件商品</span><span></span></div>
      <div class="ct-total"><span>合計</span><span>${formatPrice(total)}</span></div>
    </div>

    <div class="field">
      <label class="field-label">請填入您的 LINE 名稱 <span style="color:var(--c-orange)">*</span></label>
      <input type="text" id="lineNameInput" placeholder="例：楓谷玩家小明">
    </div>

    <div class="checkout-note">
      請按下方按鈕，我們會自動產生訂單圖片並下載，<br>
      接著為您開啟 LINE 官方帳號，<br>
      請將下載好的訂單圖片傳送給小編<br>
      <strong>等待小編確認商品數量與金額後，才算下單成功！</strong>
    </div>

    <button class="btn-line" id="submitOrderBtn">
      <span style="font-weight:700">LINE</span> 產生訂單圖片並前往官方帳號
    </button>

    <div class="line-block" style="border-color:var(--c-rose); margin-top:16px; margin-left:0; margin-right:0">
      <div class="line-logo" style="background:var(--c-coffee)">${icon('message-circle', 18)}</div>
      <div class="line-info">
        <p>${escapeHtml(settings.lineCommunityTitle || '')}</p>
        <span>${escapeHtml(settings.lineCommunityText || '')}</span>
      </div>
      <a class="line-arrow" href="${settings.lineCommunityUrl}" target="_blank" aria-label="加入LINE社群">${icon('chevron-right', 18)}</a>
    </div>
  `;

  container.innerHTML = html;
  document.getElementById('submitOrderBtn').addEventListener('click', handleSubmitOrder);
}

function changeQty(idx, delta) {
  const cart = getCart();
  const newQty = cart[idx].qty + delta;
  if (newQty < 1) {
    removeItem(idx);
    return;
  }
  updateCartQty(idx, newQty);
  refreshCartBadge();
  render();
}

function removeItem(idx) {
  removeFromCart(idx);
  refreshCartBadge();
  render();
}

async function handleSubmitOrder() {
  const lineNameInput = document.getElementById('lineNameInput');
  const lineName = lineNameInput.value.trim();

  if (!lineName) {
    showToast('請先填入您的 LINE 名稱');
    lineNameInput.focus();
    return;
  }

  const cart = getCart();
  if (cart.length === 0) return;

  const btn = document.getElementById('submitOrderBtn');
  btn.disabled = true;
  btn.innerHTML = `產生圖片中...`;

  try {
    await generateAndDownloadOrderImage(cart, lineName);

    // 記錄訂單到 Firestore（給後台查看用）
    await db.collection(COL.ORDERS).add({
      lineName: lineName,
      items: cart,
      total: cart.reduce((sum, item) => sum + item.price * item.qty, 0),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    showToast('訂單圖片已下載！即將前往 LINE 官方帳號');

    setTimeout(() => {
      location.href = settings.lineOfficialUrl;
    }, 1200);

  } catch (err) {
    console.error(err);
    showToast('產生訂單圖片時發生錯誤，請稍後再試');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<span style="font-weight:700">LINE</span> 產生訂單圖片並前往官方帳號`;
  }
}

async function generateAndDownloadOrderImage(cart, lineName) {
  const canvas = document.getElementById('orderImageCanvas');
  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  canvas.innerHTML = `
    <div class="oi-header">
      <div class="oi-title">${escapeHtml(settings.siteName)}</div>
      <div class="oi-sub">${escapeHtml(settings.siteSubtitle)}</div>
    </div>
    ${cart.map(item => `
      <div class="oi-item">
        <div class="oi-img">${item.image ? `<img src="${item.image}" crossorigin="anonymous">` : ''}</div>
        <div>
          <div class="oi-name">${escapeHtml(item.name)}</div>
          <div class="oi-meta">${item.style ? `款式：${escapeHtml(item.style)} ・ ` : ''}數量：${item.qty}</div>
        </div>
        <div class="oi-price">${formatPrice(item.price * item.qty)}</div>
      </div>
    `).join('')}
    <div class="oi-total"><span>訂單合計</span><span>${formatPrice(total)}</span></div>
    <div class="oi-customer">
      ${icon('user', 18)}LINE 名稱：${escapeHtml(lineName)}
    </div>
    <div class="oi-footer">訂單產生時間：${dateStr}　${escapeHtml(settings.watermarkText)}</div>
  `;

  // 等待所有圖片載入完成（或失敗），避免截圖時圖片還沒準備好
  const imgEls = canvas.querySelectorAll('img');
  await Promise.all(Array.from(imgEls).map(img => {
    if (img.complete) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve;
      setTimeout(resolve, 3000); // 最多等3秒，避免卡住
    });
  }));

  const renderedCanvas = await html2canvas(canvas, {
    backgroundColor: '#efeeee',
    scale: 2,
    useCORS: true,
    allowTaint: true
  });

  const link = document.createElement('a');
  link.download = `K.Zone訂單_${lineName}_${Date.now()}.png`;
  link.href = renderedCanvas.toDataURL('image/png');
  link.click();
}

init();
</script>

</body>
</html>
