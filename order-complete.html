<title>訂單已送出｜K.Zone 日韓代購</title>
<link rel="stylesheet" href="style.css">
<style>
.complete-wrap {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 20px 60px;
  text-align: center;
}
.check-circle {
  width: 80px; height: 80px;
  background: var(--c-coffee);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
}
.check-circle svg { color: #fff; }
.complete-title {
  font-size: 22px; font-weight: 700;
  color: var(--c-coffee); margin-bottom: 10px;
}
.complete-sub {
  font-size: 14px; color: var(--c-rose-text);
  line-height: 1.8; margin-bottom: 28px;
}
.notice-box {
  background: #fff; border-radius: 14px;
  border: 1px solid var(--c-blush);
  padding: 18px 20px; margin-bottom: 20px;
  width: 100%; max-width: 440px; text-align: left;
}
.notice-box h3 {
  font-size: 13px; font-weight: 700;
  color: var(--c-coffee); margin-bottom: 10px;
}
.notice-box p {
  font-size: 12px; color: var(--c-rose-text);
  line-height: 1.9;
}
.line-btn-wrap {
  width: 100%; max-width: 440px;
}
.btn-line-big {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; width: 100%;
  background: #06C755; color: #fff;
  border: none; border-radius: 12px;
  padding: 15px; font-size: 15px; font-weight: 700;
  cursor: pointer; margin-bottom: 12px;
  text-decoration: none;
}
.btn-back {
  display: block; width: 100%;
  background: #fff; color: var(--c-coffee);
  border: 1px solid var(--c-rose);
  border-radius: 12px; padding: 13px;
  font-size: 14px; font-weight: 700;
  text-align: center; text-decoration: none;
}
.trademark-notice {
  margin-top: 32px;
  font-size: 10px; color: var(--c-rose-text);
  opacity: 0.7; line-height: 1.6;
}
</style>
</head>
<body style="background:var(--c-bg)">

<div class="complete-wrap">

  <div class="check-circle">
    <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6 9 17l-5-5"/>
    </svg>
  </div>

  <div class="complete-title">訂單已送出！</div>
  <div class="complete-sub" id="completeSub">
    感謝您的訂購 🍄<br>
    小編確認商品數量與金額後<br>
    會盡快透過 LINE 與您聯繫
  </div>

  <div class="notice-box" id="orderNoBox" style="display:none; text-align:center">
    <h3 style="text-align:center">🎫 訂單編號</h3>
    <p style="font-size:20px; font-weight:700; color:var(--c-orange); text-align:center; letter-spacing:1px" id="orderNoText"></p>
  </div>

  <div class="notice-box">
    <h3>📋 訂單注意事項</h3>
    <p id="orderNoticeText">
      ・ 預購商品需等小編確認後才算成立<br>
      ・ 現貨商品以實際庫存為準，若缺貨會主動通知<br>
      ・ 如有任何問題，請透過下方 LINE 官方帳號聯繫小編<br>
      ・ 請保存訂單圖片，方便對照確認
    </p>
  </div>

  <div class="line-btn-wrap">
    <a id="lineOfficialBtn" href="#" class="btn-line-big" target="_blank">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M19.365 9.89c.50 0 .866.37.866.82s-.366.82-.866.82H17.4v1.04h1.965c.5 0 .866.37.866.82s-.366.82-.866.82H16.534a.857.857 0 0 1-.866-.82V7.87c0-.453.366-.82.866-.82h2.831c.5 0 .866.37.866.82s-.366.82-.866.82H17.4v1.04h1.965Zm-5.198 3.3a.87.87 0 0 1-.591.23.889.889 0 0 1-.591-.23L11.15 11.3v1.73c0 .453-.366.82-.866.82s-.866-.367-.866-.82V7.87c0-.39.257-.724.617-.82a.875.875 0 0 1 .84.23l1.835 1.89V7.87c0-.453.366-.82.866-.82s.866.367.866.82v4.06a.809.809 0 0 1-.24.56Zm-5.998.59c0 .453-.366.82-.866.82s-.866-.367-.866-.82V7.87c0-.453.366-.82.866-.82s.866.367.866.82v5.91Zm-2.83 0c0 .453-.366.82-.866.82H2.642a.857.857 0 0 1-.866-.82V7.87c0-.453.366-.82.866-.82s.866.367.866.82v5.09h1.965c.5 0 .866.37.866.82ZM24 10.31C24 4.62 18.617 0 12 0S0 4.62 0 10.31c0 5.097 4.511 9.368 10.604 10.175.413.09.975.274 1.117.63.128.322.084.824.041 1.149l-.18 1.09c-.055.322-.255 1.26 1.105.687 1.36-.574 7.338-4.32 10.009-7.399C23.265 14.602 24 12.544 24 10.31Z"/>
      </svg>
      聯繫 LINE 官方小編
    </a>
    <a href="index.html" class="btn-back">繼續瀏覽商品</a>
  </div>

  <div class="trademark-notice">
    MapleStory® and related characters are trademarks of NEXON.<br>
    本站僅販售官方正版商品，相關角色著作權與商標權歸 NEXON 所有。
  </div>

</div>

<script src="firebase-config.js"></script>
<script src="assets/icons.js"></script>
<script>
async function init() {
  try {
    const settings = await getSettings();
    const btn = document.getElementById('lineOfficialBtn');
    if (settings.lineOfficialUrl) {
      btn.href = settings.lineOfficialUrl;
    }
  } catch (e) {
    // 讀取設定失敗時，按鈕連結維持空白，不影響頁面顯示
  }

  // 讀取剛剛結帳產生的訂單編號/類型（只用一次就清除，避免重整頁面又顯示舊資料）
  try {
    const raw = sessionStorage.getItem('kzone_last_order');
    if (raw) {
      const lastOrder = JSON.parse(raw);
      sessionStorage.removeItem('kzone_last_order');

      if (lastOrder.orderNo) {
        document.getElementById('orderNoBox').style.display = 'block';
        document.getElementById('orderNoText').textContent = lastOrder.orderNo;
      }

      if (lastOrder.orderType === 'cvs') {
        document.getElementById('completeSub').innerHTML = `
          感謝您的訂購 🍄<br>
          現貨商品都會在2天內出貨<br>
          請截圖此結帳訂單編號<br>
          有任何問題將此編號發送給LINE官方小編
        `;
        document.getElementById('orderNoticeText').innerHTML = `
          ・ 現貨商品將於2天內安排出貨<br>
          ・ 如有任何問題，請將訂單編號截圖發送給 LINE 官方小編<br>
          ・ 請保存本頁訂單編號，方便對照確認
        `;
      } else if (lastOrder.orderType === 'preorder') {
        document.getElementById('completeSub').innerHTML = `
          感謝您的訂購 🍄<br>
          小編確認商品數量與金額後<br>
          會盡快透過 LINE 與您聯繫
        `;
      }
    }
  } catch (e) {
    console.error('讀取訂單編號失敗:', e);
  }
}
init();
</script>

</body>
</html>
