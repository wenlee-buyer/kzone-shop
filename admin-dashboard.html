<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理後台｜K.Zone 日韓代購</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="assets/admin-style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
</head>
<body>

<script>
if (sessionStorage.getItem('kzone_admin_auth') !== '1') {
  location.href = 'admin.html';
}
</script>

<div class="mobile-admin-topbar">
  <div class="logo-title" style="font-size:15px">K.Zone 後台</div>
  <select id="mobileNavSelect">
    <option value="products">商品管理</option>
    <option value="categories">來源分類</option>
    <option value="tags">角色標籤</option>
    <option value="orders">訂單列表</option>
    <option value="import">同步匯入</option>
    <option value="settings">網站設定</option>
  </select>
</div>

<div class="admin-shell">
  <div class="admin-sidebar">
    <div class="admin-logo">
      <div class="logo-title">K.Zone 後台</div>
      <p>管理你的楓谷代購商店</p>
    </div>
    <div class="admin-nav-item active" data-page="products"><i class="ti ti-package"></i>商品管理</div>
    <div class="admin-nav-item" data-page="categories"><i class="ti ti-tag"></i>來源分類</div>
    <div class="admin-nav-item" data-page="tags"><i class="ti ti-hash"></i>角色標籤</div>
    <div class="admin-nav-item" data-page="orders"><i class="ti ti-clipboard-list"></i>訂單列表</div>
    <div class="admin-nav-item" data-page="import"><i class="ti ti-refresh"></i>商品同步匯入</div>
    <div class="admin-nav-item" data-page="settings"><i class="ti ti-settings"></i>網站設定</div>
    <div class="admin-nav-item" id="logoutBtn" style="margin-top:20px; border-top:0.5px solid var(--c-blush); padding-top:16px"><i class="ti ti-logout"></i>登出</div>
    <a href="index.html" target="_blank" class="admin-nav-item" style="text-decoration:none"><i class="ti ti-external-link"></i>查看前台網站</a>
  </div>

  <div class="admin-main" id="adminMain">
    <div class="loading-wrap"><div class="spin"></div>載入後台資料中...</div>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="assets/illustrations.js"></script>
<script src="assets/common.js"></script>
<script src="assets/admin-products.js"></script>
<script src="assets/admin-categories.js"></script>
<script src="assets/admin-orders.js"></script>
<script src="assets/admin-import.js"></script>
<script src="assets/admin-settings.js"></script>
<script>
let appState = {
  products: [],
  categories: [],
  tags: [],
  settings: {}
};

async function bootAdmin() {
  await ensureDefaultData();
  await reloadCoreData();
  navigateTo('products');
}

async function reloadCoreData() {
  const [catSnap, tagSnap, settingsData] = await Promise.all([
    db.collection(COL.CATEGORIES).orderBy('order').get(),
    db.collection(COL.TAGS).orderBy('order').get(),
    getSettings()
  ]);
  appState.categories = catSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  appState.tags = tagSnap.docs.map(d => ({ id: d.id, ...d.data() }));
  appState.settings = settingsData;
}

const PAGE_RENDERERS = {
  products: renderProductsPage,
  categories: renderCategoriesPage,
  tags: renderTagsPage,
  orders: renderOrdersPage,
  import: renderImportPage,
  settings: renderSettingsPage
};

function navigateTo(page) {
  document.querySelectorAll('.admin-nav-item[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  document.getElementById('mobileNavSelect').value = page;
  const renderer = PAGE_RENDERERS[page];
  if (renderer) renderer();
}

document.querySelectorAll('.admin-nav-item[data-page]').forEach(el => {
  el.addEventListener('click', () => navigateTo(el.dataset.page));
});
document.getElementById('mobileNavSelect').addEventListener('change', (e) => navigateTo(e.target.value));
document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('kzone_admin_auth');
  location.href = 'admin.html';
});

bootAdmin();
</script>

</body>
</html>
