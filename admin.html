<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理後台｜K.Zone 日韓代購</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--c-cream); }
.login-box { background: #fff; border-radius: 16px; padding: 32px 28px; width: 90%; max-width: 360px; border: 0.5px solid var(--c-blush); }
.login-logo { text-align: center; margin-bottom: 24px; }
.login-logo .logo-title { font-size: 20px; }
.login-logo p { font-size: 12px; color: var(--c-rose-text); margin-top: 6px; }
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">
    <div class="logo-title">K.Zone 管理後台</div>
    <p>請輸入管理密碼以繼續</p>
  </div>
  <div class="field">
    <input type="password" id="pwInput" placeholder="管理密碼" autofocus>
  </div>
  <button class="btn-primary" id="loginBtn">登入後台</button>
  <p id="errMsg" style="color:#C0392B; font-size:12px; margin-top:10px; text-align:center; display:none">密碼錯誤，請再試一次</p>
</div>

<script src="firebase-config.js"></script>
<script>
async function checkLogin() {
  if (sessionStorage.getItem('kzone_admin_auth') === '1') {
    location.href = 'admin-dashboard.html';
  }
}
checkLogin();

async function doLogin() {
  const pw = document.getElementById('pwInput').value;
  const settings = await getSettings();
  const stored = settings.adminPassword || '';

  let ok = false;
  if (looksLikeHash(stored)) {
    ok = (await sha256Hex(pw)) === stored;
  } else {
    // 相容尚未雜湊過的舊資料：先明文比對，成功後自動升級成雜湊存回 Firestore
    ok = pw === stored;
    if (ok) {
      try {
        const hashed = await sha256Hex(pw);
        await db.collection(COL.SETTINGS).doc('main').set({ adminPassword: hashed }, { merge: true });
      } catch (e) {
        console.error('密碼自動升級為雜湊失敗:', e);
      }
    }
  }

  if (ok) {
    sessionStorage.setItem('kzone_admin_auth', '1');
    location.href = 'admin-dashboard.html';
  } else {
    document.getElementById('errMsg').style.display = 'block';
  }
}

document.getElementById('loginBtn').addEventListener('click', doLogin);
document.getElementById('pwInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') doLogin();
});
</script>

</body>
</html>
